name: publish keyway_cli

# The first keyway and keyway_cli versions must be published manually; pub.dev
# only enables trusted publishing after it owns the package. Subsequent CLI
# releases use their independent monorepo tag and package directory.
on:
  push:
    tags: ['keyway_cli-v[0-9]+.[0-9]+.[0-9]+*']

permissions:
  contents: read

jobs:
  publish:
    permissions:
      id-token: write
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
    with:
      working-directory: packages/keyway_cli
      environment: pub.dev
