include: package:lints/recommended.yaml

analyzer:
  # example_flutter/ is a separate package (Flutter host app for the mobile +
  # desktop integration tiers) with its own analysis_options + flutter_lints.
  # The root `dart analyze` job resolves only this package (no Flutter SDK), so
  # its Flutter imports would fail to resolve here — analyze it via
  # `flutter analyze` in its own dir, not from the root context.
  exclude:
    - example_flutter/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # A security library must not ship analyzer warnings. Treat them as errors.
    todo: ignore
    unused_import: error
    unused_local_variable: error
    dead_code: error

linter:
  rules:
    - avoid_dynamic_calls
    - cancel_subscriptions
    - close_sinks
    - only_throw_errors
    - prefer_final_locals
    - throw_in_finally
    - unnecessary_await_in_return
    - unnecessary_lambdas
    - unnecessary_parenthesis
