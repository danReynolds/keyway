name: secret_store
description: >-
  Platform-keystore secret storage for Dart without Flutter. macOS Keychain and
  Linux Secret Service backends, plus an authenticated encrypted-file container,
  behind one small async API. See doc/rfcs/0005 in dune_cli for the design.
version: 0.1.0
# Not yet published. publish_to keeps `dart pub publish` from firing by accident.
publish_to: none

environment:
  sdk: ^3.6.0

# Dependency policy (RFC 0005 §4a): exactly one third-party runtime dependency,
# exact-pinned, its transitive closure entirely dart-lang official. A
# dart pub deps snapshot test (test/dependency_closure_test.dart) fails CI if
# this tree changes. Do not widen a pin or add a dependency without the RFC's
# review bar.
dependencies:
  cryptography: 2.9.0 # exact pin — vector-firewalled in test/
  # dart-lang official; needed for the POSIX file shim (0600-from-birth + fsync,
  # which dart:io cannot express). Already in cryptography's transitive closure.
  ffi: 2.2.0

dev_dependencies:
  lints: ^5.0.0
  test: ^1.25.0
